<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form {
            max-width: 500px;
            width: 100%;
            height: 100%;
            margin: 0px auto;
            padding: 10px 0px;
            border-radius: 12px;
            background-color: #171717;
            border: 1px solid #ffd800;
        }

        .logo {
            text-align: center;
            color: white;
            font-size: 22px;
        }

        .code {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 20px;
            color: #ff4500;
            width: 100%;
        }

        .info {
            margin-top: 10px;
            text-align: center;
            color: #808080;
            font-size: 14px;
        }
    </style>


    <div class="form">
        <p class="logo">VoClip</p>
        <p class="code">{{CODE}}</p>
        <p class="info">Код будет действителен в течении {{TIME}} минут</p>
    </div>
</body>
</html>
