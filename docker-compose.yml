services:

  postgres:
    image: postgres:16
    container_name: learn-english-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: learn-english-redis

  backend:
    build: 
      context: ./backend/Online_KinoTeater
      dockerfile: Api/Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      ASPNETCORE_URLS: http://+:8080    
      ConnectionStrings__DataBase: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      JwtSettings__SecretKey: ${JWT_SECRET}
      Email__From: ${EMAIL_FROM}
      Email__SmtpUser: ${SMTP_USER}
      Email__SmtpPass: ${SMTP_PASS}
      YoutubeApi__ApiKey: ${YOUTUBE_APIKEY}
      Llm__ApiKey: ${LLM_APIKEY}
      Admin__Secret: ${ADMIN_SECRET}
      Admin__XAdminKey: ${XADMINKEY}
      S3Storage__AccessKey: ${S3_ACCESSKEY}
      S3Storage__SecretKey: ${S3_SECRETKEY}
      S3Storage__BucketName: ${S3_BUCKET}


  frontend:
    build: 
      context: ./frontend/learn_english_service
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5000:80"
    depends_on:
      - backend

volumes:
  postgres_data:


